{% extends "base.html" %}

{% block title %}Add Todo - Todo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-plus-circle"></i> Add New Todo
                </h3>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Title *</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" 
                               placeholder="What needs to be done?" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" 
                                  rows="3" placeholder="Add a description (optional)"></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="due_date" class="form-label">Due Date</label>
                        <input type="datetime-local" class="form-control form-control-lg" id="due_date" name="due_date">
                        <div class="form-text">Optional: Set a due date and time.</div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-plus-circle"></i> Add Todo
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
