{% extends "base.html" %}

{% block title %}Edit Todo - Todo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-pencil"></i> Edit Todo
                </h3>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Title *</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" 
                               value="{{ todo.title }}" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" 
                                  rows="3">{{ todo.description or '' }}</textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="completed" class="form-label d-flex align-items-center gap-2">
                            <input type="checkbox" class="form-check-input flex-shrink-0" id="completed" name="completed" 
                                   {% if todo.completed %}checked{% endif %}>
                            Completed
                        </label>
                    </div>
                    
                    <div class="mb-4">
                        <label for="due_date" class="form-label">Due Date</label>
                        <input type="datetime-local" class="form-control form-control-lg" id="due_date" name="due_date" 
                               value="{{ todo.due_date.strftime('%Y-%m-%dT%H:%M') if todo.due_date else '' }}">
                        <div class="form-text">Optional: Set a due date and time.</div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check"></i> Save Changes
                        </button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
